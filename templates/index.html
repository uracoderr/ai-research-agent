<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThesisPilot - Academic Research Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <style>
        body { word-break: break-word; overflow-wrap: break-word; }
        .markdown-body h1, .markdown-body h2 { color: #38bdf8; margin-top: 1.5rem; margin-bottom: 0.75rem; border-left: 4px solid #6366f1; padding-left: 10px;}
        .markdown-body p, .markdown-body li { color: #94a3b8; line-height: 1.7; margin-bottom: 1rem; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 1.25rem 0; font-size: 0.85rem;}
        .markdown-body th, .markdown-body td { border: 1px solid #334155; padding: 8px 12px; }
        .markdown-body th { background-color: #1e293b; color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; }
        .mermaid svg { min-width: 800px !important; height: auto; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .progress-shimmer { background: linear-gradient(90deg, #0d9488 0%, #2dd4bf 50%, #0d9488 100%); background-size: 200% 100%; animation: shimmer 2s infinite linear; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex relative">

    <aside id="sidebar" class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-screen hidden md:flex shrink-0">
        <div class="p-4 border-b border-slate-800"><h1 class="text-xl font-bold text-teal-400">🎓 ThesisPilot</h1></div>
        <div class="p-3"><button onclick="showNewResearchForm()" class="w-full bg-teal-600/20 text-teal-400 py-2 rounded-xl">➕ New Assignment</button></div>
        <div class="flex-1 overflow-y-auto px-3 py-2">
            <p class="text-[10px] text-slate-500 uppercase px-2 mb-2">My Drafts (Local)</p>
            <div id="history-list" class="space-y-1 text-xs text-slate-600 px-2">Loading...</div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-y-auto w-full">
        <main class="max-w-5xl mx-auto w-full px-4 py-6 flex flex-col">
            <div id="form-container" class="max-w-xl mx-auto w-full space-y-6 mt-10">
                <form onsubmit="startResearch(event)" class="bg-slate-900/80 p-6 rounded-2xl border border-slate-800">
                    <label class="text-xs font-bold text-slate-400">Assignment Topic</label>
                    <textarea id="topic-input" rows="3" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm my-2 text-white"></textarea>
                    <button type="submit" class="w-full bg-teal-600 py-3 rounded-xl font-bold">Research & Draft Assignment</button>
                </form>
            </div>

            <div id="terminal-container" class="hidden max-w-xl mx-auto w-full py-10 space-y-4">
                <p id="status-text" class="text-center text-xs text-teal-400 font-mono">Initializing...</p>
                <div class="w-full bg-slate-900 rounded-full h-3 border border-slate-800"><div id="progress-bar" class="progress-shimmer h-2 rounded-full" style="width:5%"></div></div>
            </div>

            <div id="result-container" class="hidden w-full space-y-6">
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between">
                    <h3 id="res-topic" class="font-bold text-white capitalize"></h3>
                    <a id="download-md" class="bg-slate-800 text-xs px-3 py-2 rounded-lg">Download .md</a>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                    <div class="lg:col-span-2 bg-slate-900 border border-slate-800 p-6 rounded-xl shadow-lg max-h-[750px] overflow-y-auto">
                        <div id="report-content" class="markdown-body"></div>
                    </div>
                    <div class="lg:col-span-1 space-y-4 sticky top-6">
                        <div class="bg-slate-950 border border-slate-800 rounded-xl p-4 h-[400px] flex flex-col relative">
                            <div id="rag-chat" class="flex-grow overflow-y-auto space-y-2 mb-2 text-xs"></div>
                            <div class="flex gap-2">
                                <input type="text" id="rag-input" placeholder="Ask AI about this..." class="flex-grow bg-slate-900 border border-slate-700 rounded px-2 text-xs text-white">
                                <button onclick="sendRAG()" class="bg-emerald-600 px-3 py-1.5 rounded font-bold text-xs">Ask</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentTopic = "";

        // 🔴 PRIVACY FIX: LocalStorage History Management
        window.addEventListener('DOMContentLoaded', loadHistory);
        function loadHistory() {
            const hList = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('thesis_history') || '[]');
            if (history.length > 0) {
                hList.innerHTML = history.map(item => `<button onclick="loadPastReport('${item.id}')" class="w-full text-left py-2 hover:text-teal-400 truncate">${item.title}</button>`).join('');
            } else { hList.innerHTML = "No drafts yet."; }
        }

        function saveToHistory(safe_topic, title) {
            let history = JSON.parse(localStorage.getItem('thesis_history') || '[]');
            if(!history.find(i => i.id === safe_topic)) {
                history.unshift({id: safe_topic, title: title});
                localStorage.setItem('thesis_history', JSON.stringify(history));
                loadHistory();
            }
        }

        async function loadPastReport(safeTopic) {
            document.getElementById('form-container').classList.add('hidden');
            const resContainer = document.getElementById('result-container');
            const reportContent = document.getElementById('report-content');
            resContainer.classList.remove('hidden');
            
            const res = await fetch(`/api/report/${safeTopic}`);
            const data = await res.json();
            if(data.report) {
                currentTopic = data.safe_topic;
                document.getElementById('res-topic').innerText = data.topic;
                // DOMPurify applied again on client side
                reportContent.innerHTML = DOMPurify.sanitize(data.report); 
            }
        }

        function showNewResearchForm() {
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('form-container').classList.remove('hidden');
        }

        function startResearch(event) {
            event.preventDefault();
            const topic = document.getElementById('topic-input').value;
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('terminal-container').classList.remove('hidden');
            
            const evtSource = new EventSource(`/stream-research?topic=${encodeURIComponent(topic)}&language=english`);
            evtSource.onmessage = function(e) {
                let data = e.data;
                if (data.startsWith("[PROGRESS:")) {
                    const match = data.match(/\[PROGRESS:(\d+)\](.*)/);
                    document.getElementById('progress-bar').style.width = match[1] + '%';
                    document.getElementById('status-text').innerText = match[2];
                } else if (data.startsWith("{")) {
                    const json = JSON.parse(data);
                    if (json.status === "done") {
                        evtSource.close();
                        currentTopic = json.metrics.safe_topic;
                        saveToHistory(currentTopic, json.topic);
                        
                        document.getElementById('res-topic').innerText = json.topic;
                        document.getElementById('download-md').href = json.metrics.md_path;
                        // DOMPurify
                        document.getElementById('report-content').innerHTML = DOMPurify.sanitize(json.report);
                        
                        document.getElementById('terminal-container').classList.add('hidden');
                        document.getElementById('result-container').classList.remove('hidden');
                    }
                }
            };
        }

        async function sendRAG() {
            const input = document.getElementById('rag-input');
            const box = document.getElementById('rag-chat');
            const query = input.value; input.value = "";
            box.innerHTML += `<div class="text-white text-right bg-slate-800 p-2 rounded text-xs ml-6">${DOMPurify.sanitize(query)}</div>`;
            
            const res = await fetch('/ask-rag', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({topic: currentTopic, query: query}) // using query field
            });
            const data = await res.json();
            box.innerHTML += `<div class="text-emerald-300 bg-slate-950 p-2 rounded text-xs mr-6">${DOMPurify.sanitize(data.answer)}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
